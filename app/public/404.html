<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>onaNES</title>
  <!--
      Single Page Apps for GitHub Pages.
      GitHub Pages has no server-side routing, so a deep link like
      /react-nes/play/zelda returns this 404 page. We encode the requested path
      into a query string and redirect to the app root; index.html then decodes
      it and hands the real route to React Router.

      pathSegmentsToKeep = 1 keeps the project-page base segment (/react-nes).
      https://github.com/rafgraph/spa-github-pages
    -->
  <script type="text/javascript">
    var pathSegmentsToKeep = 1;

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body>
</body>

</html>
